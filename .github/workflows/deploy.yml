name: Deploy Sendoomi (Cloudflare)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Ensure only one deployment runs at a time per branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests (Gate)
        run: npm test

  build_and_preview:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build MPA
        run: npm run build

      - name: Deploy Marketing (sendoomi.com)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "sendoomi-www"
          directory: "dist/www"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Explicitly set branch for Direct Upload preview mapping
          branch: ${{ github.head_ref || github.ref_name }}

      - name: Deploy App (app.sendoomi.com)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "sendoomi-app"
          directory: "dist/app"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Explicitly set branch for Direct Upload preview mapping
          branch: ${{ github.head_ref || github.ref_name }}
